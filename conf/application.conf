[COMMON]
PROJECT_NAME = sensor-data-normalization
CHANNEL_NAME = test

; STORAGE: 정규화(split·merge) 결과를 쓰는 출력 스토리지.
; 본 Task에서는 로컬 경로. 후속 작업에서 S3 등으로 교체 가능.
[STORAGE]
ROOT = /data16/sensor-data-normalization
PREFIX = split

; STORAGE_CACHE: 원본 PCAP을 받아 두는 입력 캐시. 항상 로컬.
[STORAGE_CACHE]
ROOT = /data16/sensor-data-normalization
PREFIX = cache

; STORAGE_UNPAIRED_MERGE: 짝을 맺지 못한 HEAD/TAIL 조각을 merge하기 위한 임시 경로.
[STORAGE_UNPAIRED_MERGE]
ROOT = /data16/sensor-data-normalization
PREFIX = unpaired_merge

[NORMALIZER]
; swm argv의 processSize에 해당. 워커 프로세스 수.
WORKER_COUNT = 4

[REST]
BASE_URL = http://localhost:28888/v1/etl

[SELECTED_DEVICE]
; ALL | CAMERA | LIDAR | GNSS | 또는 단일 디바이스명(AT128_ROOF_FRONT 등)
SELECTED = ALL
