[COMMON]
PROJECT_NAME = sensor-data-normalization
CHANNEL_NAME = test

; STORAGE: 정규화(1초 split + MID/merge) 결과를 쓰는 S3 출력.
;   s3://<ROOT>/<PREFIX>/{vehicle_id}/{module_type}/{module_name}/{date}/{hours}/{minutes}/
[STORAGE]
ROOT = /oncx-dev-common-assets-bucket
PREFIX = test/split

; STORAGE_RAW: replayer 등이 올린 원본 PCAP의 S3 입력 위치 (read-only).
;   Manager 가 listing/download 소스로만 사용.
[STORAGE_RAW]
ROOT = /oncx-dev-common-assets-bucket
PREFIX = test/raw

; STORAGE_CACHE: Module 이 S3 raw 를 다운로드 받아 split 하는 로컬 작업 디렉토리.
[STORAGE_CACHE]
ROOT = /data1/sensor-data-normalization
PREFIX = cache

; STORAGE_UNPAIRED_MERGE: 짝을 맺지 못한 HEAD/TAIL 조각을 merge 하기 위한 로컬 임시 경로.
[STORAGE_UNPAIRED_MERGE]
ROOT = /data1/sensor-data-normalization
PREFIX = unpaired_merge

[NORMALIZER]
WORKER_COUNT = 4

; REDIS: 정규화 요청 Pub/Sub 채널.
; 외부 시스템(Slack/REST/CLI)이 CHANNEL_NAME 으로 PUBLISH 하면 daemon 이 SUBSCRIBE 로 수신.
; envelope.receiver 가 RECEIVER 와 일치할 때만 처리.
[REDIS]
HOST = 127.0.0.1
PORT = 6379
CHANNEL_NAME = normalize_requests
RECEIVER = normalizer

; NOTIFICATION: 처리 완료/실패 알림. Slack Incoming Webhook 사용.
; WEBHOOK_URL 빈 값이면 알림 skip (개발 환경).
[NOTIFICATION]
WEBHOOK_URL =
DEFAULT_CHANNEL = #data-pipeline

[SELECTED_DEVICE]
; ALL | CAMERA | LIDAR | GNSS | 또는 단일 디바이스명(AT128_ROOF_FRONT 등)
SELECTED = ALL
