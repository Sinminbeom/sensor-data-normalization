[loggers]
keys=root,sensor-data-normalization

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=WARNING
handlers=consoleHandler

[logger_sensor-data-normalization]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=sensor-data-normalization
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=simpleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=handlers.TimedRotatingFileHandler
level=DEBUG
formatter=simpleFormatter
args=('./logs/sensor-data-normalization.log', 'midnight', 1, 7, 'utf-8')

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - [%(thread)d] - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
